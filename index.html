<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>极简记账</title>
    <style>
        :root {
            --income: #2ecc71;
            --expense: #e74c3c;
            --bg: #f5f6fa;
            --card: #ffffff;
            --text: #2c3e50;
            --text-secondary: #7f8c8d;
            --primary: #3498db;
            --border: #ecf0f1;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px 16px 100px;
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* 月份切换 */
        .month-picker {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
        }
        .month-picker button {
            background: none;
            border: none;
            font-size: 22px;
            color: var(--text);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .month-picker button:active { background: var(--border); }
        .month-title {
            font-size: 18px;
            font-weight: 600;
            min-width: 110px;
            text-align: center;
            color: var(--text);
        }

        /* 每日名言卡片 */
        .quote-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 18px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            border-left: 4px solid var(--primary);
        }
        .quote-text {
            font-style: italic;
            margin-bottom: 6px;
        }
        .quote-author {
            font-weight: 600;
            color: var(--text);
            font-size: 13px;
        }

        /* 概览卡片 */
        .overview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px 8px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }
        .card:active { transform: scale(0.97); }
        .card .label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .card .amount {
            font-size: 20px;
            font-weight: 700;
        }
        .income-amount    { color: var(--income); }
        .expense-amount   { color: var(--expense); }
        .balance-amount   { color: var(--primary); }

        /* 记账按钮 */
        .fab {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            width: 56px;
            height: 56px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 28px;
            font-size: 28px;
            box-shadow: 0 4px 16px rgba(52,152,219,0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 90;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .fab:active {
            transform: translateX(-50%) scale(0.92);
            box-shadow: 0 2px 8px rgba(52,152,219,0.3);
        }

        /* 账单列表 */
        .record-list { margin-top: 10px; }
        .date-group { margin-bottom: 20px; }
        .date-header {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 10px;
            padding-left: 6px;
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.3px;
        }
        .record-item {
            background: var(--card);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            box-shadow: var(--shadow);
            transition: transform 0.15s;
        }
        .record-item:active { transform: scale(0.98); }
        .record-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            font-size: 22px;
            background: #f0f3f5;
        }
        .record-info { flex: 1; }
        .record-category { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
        .record-note { font-size: 12px; color: var(--text-secondary); }
        .record-amount { font-weight: 700; font-size: 16px; }
        .record-amount.income { color: var(--income); }
        .record-amount.expense { color: var(--expense); }
        .record-delete {
            margin-left: 14px;
            color: #bdc3c7;
            cursor: pointer;
            font-size: 18px;
            padding: 6px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .record-delete:active { background: #f0f0f0; }

        /* 底部导航 */
        .tab-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 468px;
            background: var(--card);
            border-radius: 28px;
            padding: 6px;
            display: flex;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            z-index: 100;
        }
        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
            border: none;
            background: transparent;
            font-size: 15px;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        /* 统计面板 */
        #stats-panel { display: none; }
        #stats-panel.active { display: block; }
        .stat-box {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        .stat-box h4 { margin-bottom: 16px; color: var(--text); font-size: 16px; }
        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .stat-item:last-child { border-bottom: none; }
        .stat-bar {
            flex: 1;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin: 0 12px;
            overflow: hidden;
        }
        .stat-fill {
            height: 100%;
            border-radius: 3px;
        }
        .stat-percent {
            font-size: 13px;
            font-weight: 600;
            width: 45px;
            text-align: right;
        }

        /* 分类管理 */
        .category-manager {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 16px;
            box-shadow: var(--shadow);
        }
        .cat-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 14px; }
        .cat-tag {
            background: #f0f3f5;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .cat-tag button {
            background: none; border: none;
            color: var(--expense);
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
        }
        .add-cat-form {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .add-cat-form input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
        }
        .add-cat-form select {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
        }
        .add-cat-form button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            cursor: pointer;
            font-weight: 600;
        }
        .data-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .data-actions button {
            flex: 1;
            padding: 12px;
            background: #ecf0f1;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text);
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: flex-end;
            z-index: 200;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card);
            border-radius: 24px 24px 0 0;
            padding: 24px 20px 32px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .type-toggle {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .type-toggle button {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s;
        }
        .type-toggle button.active-income {
            border-color: var(--income);
            background: #eafaf1;
            color: var(--income);
        }
        .type-toggle button.active-expense {
            border-color: var(--expense);
            background: #fdedec;
            color: var(--expense);
        }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
        .form-group select, .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            background: #fafafa;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-row button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-save {
            background: var(--primary);
            color: white;
        }
        .btn-cancel {
            background: #ecf0f1;
            color: var(--text);
        }

        .empty-state {
            text-align: center;
            color: #bdc3c7;
            padding: 60px 20px;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <!-- 月份选择 -->
    <div class="month-picker">
        <button onclick="changeMonth(-1)">‹</button>
        <span class="month-title" id="monthTitle">2026年5月</span>
        <button onclick="changeMonth(1)">›</button>
    </div>

    <!-- 每日名言（新增） -->
    <div class="quote-card" id="dailyQuote">
        <div class="quote-text" id="quoteText"></div>
        <div class="quote-author" id="quoteAuthor"></div>
    </div>

    <!-- 收入 / 支出 / 结余 -->
    <div class="overview">
        <div class="card">
            <div class="label">收入</div>
            <div class="amount income-amount" id="incomeDisplay">¥0</div>
        </div>
        <div class="card">
            <div class="label">支出</div>
            <div class="amount expense-amount" id="expenseDisplay">¥0</div>
        </div>
        <div class="card">
            <div class="label">结余</div>
            <div class="amount balance-amount" id="balanceDisplay">¥0</div>
        </div>
    </div>

    <!-- 账单 / 统计面板切换 -->
    <div id="main-panel">
        <div class="record-list" id="recordList"></div>
    </div>

    <div id="stats-panel">
        <div class="stat-box">
            <h4>📊 本月支出分类</h4>
            <div id="expenseBreakdown"></div>
        </div>
        <div class="stat-box">
            <h4>📈 本月收入分类</h4>
            <div id="incomeBreakdown"></div>
        </div>

        <!-- 分类管理 -->
        <div class="category-manager">
            <h4>⚙️ 分类管理</h4>
            <div><strong>收入分类</strong>
                <div class="cat-row" id="incomeCatList"></div>
            </div>
            <div style="margin-top:12px;"><strong>支出分类</strong>
                <div class="cat-row" id="expenseCatList"></div>
            </div>
            <div class="add-cat-form">
                <input type="text" id="newCatInput" placeholder="新分类名称">
                <select id="newCatType">
                    <option value="income">收入</option>
                    <option value="expense">支出</option>
                </select>
                <button onclick="addCategory()">添加</button>
            </div>
            <div class="data-actions">
                <button onclick="exportData()">📤 导出备份</button>
                <button onclick="importData()">📥 导入备份</button>
            </div>
        </div>
    </div>

    <!-- 悬浮记一笔按钮 -->
    <button class="fab" onclick="openAddModal()">+</button>

    <!-- 底部导航 -->
    <div class="tab-nav">
        <button class="tab-btn active" id="tabMain" onclick="switchTab('main')">📋 账单</button>
        <button class="tab-btn" id="tabStats" onclick="switchTab('stats')">📊 统计</button>
    </div>

    <!-- 记账弹窗（底部滑出） -->
    <div class="modal" id="recordModal">
        <div class="modal-content">
            <h3 style="text-align:center; margin-bottom:20px;">记一笔</h3>
            <div class="type-toggle">
                <button id="typeIncomeBtn" class="active-income" onclick="setType('income')">💰 收入</button>
                <button id="typeExpenseBtn" onclick="setType('expense')">💸 支出</button>
            </div>
            <div class="form-group">
                <label>分类</label>
                <select id="recordCategory"></select>
            </div>
            <div class="form-group">
                <label>金额</label>
                <input type="number" id="recordAmount" placeholder="0.00" step="0.01" min="0.01" inputmode="decimal">
            </div>
            <div class="form-group">
                <label>日期</label>
                <input type="date" id="recordDate">
            </div>
            <div class="form-group">
                <label>备注（选填）</label>
                <input type="text" id="recordNote" placeholder="例如：午餐">
            </div>
            <div class="btn-row">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-save" onclick="saveRecord()">保存</button>
            </div>
        </div>
    </div>

        function getTodaysQuote() {
            const today = new Date();
            const dateString = today.getFullYear() + '-' + (today.getMonth() + 1) + '-' + today.getDate();
            let hash = 0;
            for (let i = 0; i < dateString.length; i++) {
                hash = ((hash << 5) - hash) + dateString.charCodeAt(i);
                hash |= 0; // 转为32位整数
            }
            const index = Math.abs(hash) % quotes.length;
            return quotes[index];
        }

        function displayQuote() {
            const q = getTodaysQuote();
            document.getElementById('quoteText').textContent = '“ ' + q.text + ' ”';
            document.getElementById('quoteAuthor').textContent = '—— ' + q.author;
        }

        // ---------- 数据管理 ----------
        const STORAGE_KEY = 'ledger_ui_v1';
        let data = {
            records: [],
            categories: {
                income: ['工资', '兼职', '理财', '红包'],
                expense: ['餐饮', '交通', '购物', '居家', '娱乐', '医疗']
            }
        };

        let currentMonth = new Date().toISOString().slice(0,7);
        let currentType = 'expense';

        function loadData() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) data = JSON.parse(saved);
            } catch(e) {
                data = { records: [], categories: { income: ['工资', '兼职', '理财', '红包'], expense: ['餐饮', '交通', '购物', '居家', '娱乐', '医疗'] } };
                saveData();
            }
        }
        function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
        function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }

        // ---------- 界面渲染 ----------
        function renderOverview() {
            const monthRecs = data.records.filter(r => r.date.startsWith(currentMonth));
            const inc = monthRecs.filter(r => r.type==='income').reduce((s,r) => s + r.amount, 0);
            const exp = monthRecs.filter(r => r.type==='expense').reduce((s,r) => s + r.amount, 0);
            document.getElementById('incomeDisplay').textContent = '¥' + inc.toFixed(2);
            document.getElementById('expenseDisplay').textContent = '¥' + exp.toFixed(2);
            document.getElementById('balanceDisplay').textContent = '¥' + (inc - exp).toFixed(2);
            document.getElementById('monthTitle').textContent = currentMonth.replace('-', '年') + '月';
        }

        function renderRecordList() {
            const container = document.getElementById('recordList');
            const monthRecs = data.records
                .filter(r => r.date.startsWith(currentMonth))
                .sort((a,b) => b.date.localeCompare(a.date) || (b.id > a.id ? 1 : -1));

            if (monthRecs.length === 0) {
                container.innerHTML = '<div class="empty-state">📝 暂无账单<br>点击下方 + 记一笔</div>';
                return;
            }

            const groups = {};
            monthRecs.forEach(r => {
                if (!groups[r.date]) groups[r.date] = [];
                groups[r.date].push(r);
            });

            let html = '';
            Object.keys(groups).sort().reverse().forEach(date => {
                const dayExp = groups[date].filter(r => r.type==='expense').reduce((s,r)=>s+r.amount,0);
                html += `<div class="date-group">
                    <div class="date-header">
                        <span>📅 ${date}</span>
                        <span>${dayExp > 0 ? '支出 ¥'+dayExp.toFixed(2) : ''}</span>
                    </div>`;
                groups[date].forEach(r => {
                    const icon = getIcon(r.category, r.type);
                    html += `<div class="record-item">
                        <div class="record-icon">${icon}</div>
                        <div class="record-info">
                            <div class="record-category">${r.category}</div>
                            ${r.note ? `<div class="record-note">${r.note}</div>` : ''}
                        </div>
                        <div class="record-amount ${r.type}">
                            ${r.type==='income' ? '+' : '-'}¥${r.amount.toFixed(2)}
                        </div>
                        <span class="record-delete" onclick="deleteRecord('${r.id}')">🗑️</span>
                    </div>`;
                });
                html += '</div>';
            });
            container.innerHTML = html;
        }

        function getIcon(cat, type) {
            const map = {
                income: { '工资':'💼', '兼职':'💻', '理财':'📈', '红包':'🧧' },
                expense: { '餐饮':'🍔', '交通':'🚌', '购物':'🛒', '居家':'🏠', '娱乐':'🎮', '医疗':'💊' }
            };
            return (map[type] && map[type][cat]) || (type==='income' ? '💰' : '💸');
        }

        // ---------- 统计面板 ----------
        function renderStats() {
            const monthRecs = data.records.filter(r => r.date.startsWith(currentMonth));
            const expenseRecs = monthRecs.filter(r => r.type === 'expense');
            const incomeRecs = monthRecs.filter(r => r.type === 'income');

            renderCategoryBreakdown('expenseBreakdown', expenseRecs, 'expense');
            renderCategoryBreakdown('incomeBreakdown', incomeRecs, 'income');
        }

        function renderCategoryBreakdown(containerId, records, type) {
            const container = document.getElementById(containerId);
            const total = records.reduce((s,r) => s + r.amount, 0);
            if (total === 0) {
                container.innerHTML = '<div style="color:#bdc3c7; text-align:center; padding:20px;">暂无数据</div>';
                return;
            }

            const catMap = {};
            records.forEach(r => {
                catMap[r.category] = (catMap[r.category] || 0) + r.amount;
            });

            const sorted = Object.entries(catMap).sort((a,b) => b[1] - a[1]);
            let html = '';
            sorted.forEach(([cat, amount]) => {
                const percent = ((amount / total) * 100).toFixed(1);
                const color = type === 'expense' ? '#e74c3c' : '#2ecc71';
                html += `<div class="stat-item">
                    <span>${cat}</span>
                    <div class="stat-bar">
                        <div class="stat-fill" style="width:${percent}%; background:${color};"></div>
                    </div>
                    <span class="stat-percent">${percent}%</span>
                    <span style="margin-left:8px;">¥${amount.toFixed(2)}</span>
                </div>`;
            });
            container.innerHTML = html;
        }

        // ---------- 弹窗逻辑 ----------
        function openAddModal() {
            currentType = 'expense';
            updateTypeButtons();
            populateCategorySelect();
            document.getElementById('recordAmount').value = '';
            document.getElementById('recordDate').value = new Date().toISOString().slice(0,10);
            document.getElementById('recordNote').value = '';
            document.getElementById('recordModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('recordModal').classList.remove('active');
        }

        function setType(type) {
            currentType = type;
            updateTypeButtons();
            populateCategorySelect();
        }

        function updateTypeButtons() {
            document.getElementById('typeIncomeBtn').className = currentType === 'income' ? 'active-income' : '';
            document.getElementById('typeExpenseBtn').className = currentType === 'expense' ? 'active-expense' : '';
        }

        function populateCategorySelect() {
            document.getElementById('recordCategory').innerHTML =
                data.categories[currentType].map(c => `<option>${c}</option>`).join('');
        }

        function saveRecord() {
            const category = document.getElementById('recordCategory').value;
            const amount = parseFloat(document.getElementById('recordAmount').value);
            const date = document.getElementById('recordDate').value;
            const note = document.getElementById('recordNote').value.trim();

            if (!category || isNaN(amount) || amount <= 0) {
                alert('请填写完整且正确的金额');
                return;
            }
            data.records.push({ id: uid(), type: currentType, category, amount, date, note });
            saveData();
            closeModal();
            refreshAll();
        }

        function deleteRecord(id) {
            if (!confirm('确定删除这条记录吗？')) return;
            data.records = data.records.filter(r => r.id !== id);
            saveData();
            refreshAll();
        }

        // ---------- 分类管理 ----------
        function renderCategoryManager() {
            document.getElementById('incomeCatList').innerHTML = data.categories.income.map(c =>
                `<span class="cat-tag">${c} <button onclick="removeCategory('income','${c}')">×</button></span>`
            ).join('');
            document.getElementById('expenseCatList').innerHTML = data.categories.expense.map(c =>
                `<span class="cat-tag">${c} <button onclick="removeCategory('expense','${c}')">×</button></span>`
            ).join('');
        }

        function addCategory() {
            const name = document.getElementById('newCatInput').value.trim();
            const type = document.getElementById('newCatType').value;
            if (!name) return;
            if (data.categories[type].includes(name)) {
                alert('分类已存在');
                return;
            }
            data.categories[type].push(name);
            saveData();
            document.getElementById('newCatInput').value = '';
            renderCategoryManager();
        }

        function removeCategory(type, name) {
            if (!confirm(`确定删除分类“${name}”？已有的该分类记录不受影响。`)) return;
            data.categories[type] = data.categories[type].filter(c => c !== name);
            saveData();
            renderCategoryManager();
        }

        // ---------- 数据备份 ----------
        function exportData() {
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `记账备份_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = () => {
                    try {
                        const imported = JSON.parse(reader.result);
                        if (imported.records && imported.categories) {
                            if (confirm('导入将覆盖当前数据，确定继续吗？')) {
                                data = imported;
                                saveData();
                                refreshAll();
                                alert('导入成功！');
                            }
                        } else {
                            alert('文件格式不正确');
                        }
                    } catch(ex) { alert('解析失败，请检查文件'); }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // ---------- 导航与状态 ----------
        function switchTab(tab) {
            document.getElementById('main-panel').style.display = tab === 'main' ? 'block' : 'none';
            document.getElementById('stats-panel').classList.toggle('active', tab === 'stats');
            document.getElementById('tabMain').classList.toggle('active', tab === 'main');
            document.getElementById('tabStats').classList.toggle('active', tab === 'stats');
            if (tab === 'stats') {
                renderStats();
                renderCategoryManager();
            }
        }

        function changeMonth(delta) {
            const [y, m] = currentMonth.split('-').map(Number);
            const d = new Date(y, m-1 + delta, 1);
            currentMonth = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
            refreshAll();
        }

        function refreshAll() {
            renderOverview();
            renderRecordList();
            if (document.getElementById('stats-panel').classList.contains('active')) {
                renderStats();
            }
        }

        // ---------- 启动 ----------
        loadData();
        displayQuote();   // 显示每日名言
        renderOverview();
        renderRecordList();
        document.getElementById('main-panel').style.display = 'block';

        // PWA 支持（添加到桌面）
        if ('serviceWorker' in navigator) {
            const manifest = {
                name: '极简记账',
                short_name: '记账',
                start_url: location.href,
                display: 'standalone',
                background_color: '#f5f6fa',
                theme_color: '#3498db',
                icons: [{
                    src: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100" height="100" rx="20" fill="#3498db"/><text x="50" y="68" font-size="60" text-anchor="middle" fill="white">💰</text></svg>'),
                    sizes: '100x100', type: 'image/svg+xml'
                }]
            };
            const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${url}">`);
            navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(
                'self.addEventListener("install",e=>self.skipWaiting());' +
                'self.addEventListener("activate",e=>self.clients.claim());' +
                'self.addEventListener("fetch",e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});'
            )).catch(() => {});
        }
    </script>
</body>
</html>
